### About [ about ]
about:
  title: "About Me"
  text: "
  <p>
    I&#39;m a Senior Research Consultant at Innovative Research Group. My core work is research: designing and running research programs
    for enterprise and public-sector clients, helping my clients understand and act on insights.
  </p>
  <p>
    What I enjoy most is helping people solve problems. My career highlight has been co-designing an interactive survey sent to thousands of
    electricity customers, innovating how investment trade-offs in the electricity system are conveyed. Built alongside our client,
    the research program secured 79% public acceptance for a rate increase, a figure that has since became the cornerstone of their five-year plan.
  </p>
  <p>
    The rest of my time goes to something I care about just as much: using AI to take the busywork out of research so the team
    can spend more time providing findings to our clients. I&#39;ve designed and built a suite of internal tools on Claude, from a 
    workflow that synthesizes and verifies qualitative themes across dozens of interview transcripts, to an RFP system that turns
    hundred-page tenders into a structured proposal tracker. The part I like best is the teaching: showing coworkers how a
    sharper, AI leveraged approach to our daily processes can give them hours of time back.
  </p>
  <p>
    I&#39;m now looking to take this further in a customer success or AI enablement role, where I can keep solving real problems and
    help people get more out of AI. If that sounds like a fit for your team, please get in touch.
  </p>
  "
  list:
    - label: "Years of <br>Client Facing Experience"
      icon: "far fa-gem"
      value: "6"

    - label: "AI Tools <br>Built &amp; Adopted"
      icon: "far fa-gem"
      value: "10+"

    - label: "Largest <br>Client Account"
      icon: "far fa-gem"
      value: "$400K"

  button:
    text: "Contact Me"
    link: "#contact-section"

  signature:
    image: "assets/img/signature.png"
    alt: ""

